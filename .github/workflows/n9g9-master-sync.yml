name: N9G9 - Precision Sync & Timestamp Index
on:
  schedule:
    - cron: '0 0 * * *' # 每天凌晨巡检
  workflow_dispatch:      # 允许手动执行

jobs:
  code_absolute_sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 拉取完整 Git 历史

      - name: 执行对齐、恢复与 Git 深度索引生成
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 初始化 Git
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 2. 隔离保护：备份当前工作流
          mkdir -p ../wf_backup && cp .github/workflows/*.yml ../wf_backup/
          
          # 3. 强力对齐：拉取上游完整历史
          git remote add upstream https://github.com/youhunwl/TVAPP.git
          git fetch upstream main 
          git checkout main && git reset --hard upstream/main
          
          # 4. 恢复保护：还原工作流
          mkdir -p .github/workflows && cp ../wf_backup/*.yml .github/workflows/

          echo "🟠 [索引] 正在扫描 223+ APK 文件的真实历史..."
          rm -f repo_files_raw.txt

          # A. 全盘扫描 (坚如磐石的 while 循环版，彻底告别单引号地狱)
          while IFS= read -r -d '' filepath; do
            if [[ "$filepath" == *.apk ]] && [[ ! "$filepath" =~ ^\.github/ ]] && [[ ! "$filepath" =~ ^wiki/ ]]; then
              committime=$(git log -1 --format=%ai -- "$filepath")
              echo "$filepath|$committime" >> repo_files_raw.txt
            fi
          done < <(git ls-files -z)

          # 转为 JSON (利用 jq 安全注入 GitHub 仓库名)
          if [ -f repo_files_raw.txt ]; then
            cat repo_files_raw.txt | jq -R -s -c --arg repo "${{ github.repository }}" '
              split("\n") | map(select(length > 0)) | map(split("|") | {
                name: (.[0] | split("/") | last),
                type: "repo_file",
                path: .[0],
                time: .[1],
                url: ("https://raw.githubusercontent.com/" + $repo + "/main/" + (.[0] | split("/") | map(gsub(" "; "%20")) | join("/")))
              })
            ' > repo_files.json
          else
            echo "[]" > repo_files.json
          fi

          # B. 扫描 Release
          gh api repos/${{ github.repository }}/releases --jq '
            [.[] | {tag: .tag_name, assets: .assets}] | map(select(.assets | length > 0)) 
            | [.[] | .tag as $tag | .assets[] | select(.name | endswith(".apk")) | {
                name: ("[" + $tag + "] " + .name), 
                type: "release_asset", 
                path: ("Releases/" + $tag + "/" + .name), 
                time: .updated_at,
                url: .browser_download_url
              }]
          ' > release_assets.json

          # C. 合并并提交
          jq -s 'add' repo_files.json release_assets.json > list.json
          rm -f repo_files_raw.txt
          
          # D. 提取应用描述 (终极杀手锏：利用 Heredoc 写入独立 Python 脚本，彻底解决编码与缩进问题)
          echo "🟠 [描述] 正在从 README.md 提取应用介绍..."
          cat << 'EOF' > parse_desc.py
          import json, re, os

          desc = {}
          if os.path.exists('README.md'):
              with open('README.md', 'r', encoding='utf-8') as f:
                  for line in f:
                      # 只抓取表格行，排除表头和分割线
                      if line.startswith('|') and 'APP名称' not in line and '---' not in line:
                          parts = [p.strip() for p in line.split('|')]
                          # 确保表格列数够长
                          if len(parts) >= 6:
                              name = parts[1]
                              remark = parts[5]
                              # 正则洗掉 Markdown 链接和加粗符号
                              name = re.sub(r'\[(.*?)\]\(.*?\)', r'\1', name)
                              name = name.replace('**', '').strip()
                              
                              if name and remark:
                                  desc[name] = remark

          # 无论发生什么，都强制写入一个标准 JSON 对象（哪怕是空的 {}），绝不会产生 null
          with open('desc.json', 'w', encoding='utf-8') as f:
              json.dump(desc, f, ensure_ascii=False)
          EOF
          
          python3 parse_desc.py
          rm -f parse_desc.py

          # E. 全自动生成个性化 README (保留接口源、直播源与致谢，极致排版)
          echo "🟠 [排版] 正在根据最新数据重写 README.md..."
          cat << 'EOF' > build_readme.py
          import json
          import os

          # 1. 读取应用数据
          try:
              with open('list.json', 'r', encoding='utf-8') as f:
                  apps = json.load(f)
              with open('desc.json', 'r', encoding='utf-8') as f:
                  desc_map = json.load(f)
          except Exception as e:
              print("读取 JSON 失败:", e)
              apps, desc_map = [], {}

          # 2. 核心新增：提取上游原版的“接口源”和“直播源”内容，原封不动保留
          sources_content = ""
          capture = False
          if os.path.exists('README.md'):
              with open('README.md', 'r', encoding='utf-8') as f:
                  for line in f:
                      # 遇到“接口源”标题开始抓取
                      if line.startswith('## 接口源'):
                          capture = True
                      # 遇到“免责声明”标题停止抓取
                      if line.startswith('## 免责声明'):
                          capture = False
                      
                      if capture:
                          sources_content += line

          if apps:
              # 3. 按更新时间降序排列
              apps.sort(key=lambda x: x.get('time', ''), reverse=True)

              # 4. 拼接我们专属的 Markdown 头部和应用表格
              md = "# 🚀 N9G9 极速应用商店\n\n"
              md += "> ⚡️ **全自动同步上游更新**，为您提供最新、最全的 TVBox 壳子与影视聚合应用。\n\n"
              
              md += "## 📦 最新应用一览表 (自动排版与更新)\n\n"
              md += "| APP名称 | 更新日期 | 描述 | 下载直链 |\n"
              md += "| :--- | :--- | :--- | :--- |\n"

              desc_keys = sorted(desc_map.keys(), key=len, reverse=True)

              for app in apps:
                  name = app.get('name', 'Unknown')
                  time_str = app.get('time', '')[:10]  # 只截取 YYYY-MM-DD
                  url = app.get('url', '#')
                  
                  app_desc = "暂无详细描述"
                  for key in desc_keys:
                      if key in name:
                          app_desc = desc_map[key]
                          break
                  
                  app_desc = app_desc.replace('\n', '').replace('\r', '').replace('|', '&#124;')
                  md += f"| **{name}** | `{time_str}` | {app_desc} | [📥 下载]({url}) |\n"

              # 5. 无缝插入上游原汁原味的接口源和直播源
              md += "\n---\n\n"
              if sources_content:
                  md += sources_content
              else:
                  md += "## 接口源与直播源\n\n> 暂未抓取到上游接口数据。\n\n"

              # 6. 完美融合上游的致谢与打赏码
              md += "\n---\n\n"
              md += "## 🙏 声明与致谢\n\n"
              md += "- 🚫 **免责声明**：本项目仅作技术分享与自动化构建演示，所有资源版权归原作者，严禁商业用途！\n"
              md += "- 🔗 **数据来源**：核心数据与文件实时同步自大神仓库 [youhunwl/TVAPP](https://github.com/youhunwl/TVAPP)。\n"
              md += "- ☕ **赞助原作者**：维护不易，如果这些应用对你有所帮助，**请务必扫描下方二维码支持原作者**，这将让开源生态继续走下去！\n\n"
              md += '<img src="https://github.com/user-attachments/assets/d3ab1e47-9409-4636-bb7a-25803dcd2cbd" width="50%">\n'

              # 7. 覆盖写入
              with open('README.md', 'w', encoding='utf-8') as f:
                  f.write(md)
          EOF

          python3 build_readme.py
          rm -f build_readme.py
          
          # 同步提交 list.json, desc.json 和重新生成的 README.md
          git add .github/workflows/ list.json desc.json README.md
          git commit -m "System: Auto-build beautiful README & Extract Desc" || exit 0
          git push origin main --force

  fmapp_release_sync:
    needs: code_absolute_sync
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Sync FMApp PRO
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO: ${{ github.repository }}
        run: |
          # 核心修复：引入循环深度抓取，覆盖最近 3 个版本以找回 5.0.3
          gh api repos/lystv/fmapp/releases | jq -c '[.[] | select(.tag_name | ascii_downcase | contains("pro"))] | .[0:3] | .[]' | while read -r latest_rel; do
            if [ "$latest_rel" != "null" ] && [ -n "$latest_rel" ]; then
              raw_tag=$(echo "$latest_rel" | jq -r '.tag_name')
              my_tag="FM-${raw_tag}"
              
              # 自动化清理：如果本地存在该版本，但内部没有 APK 文件（空壳），连带 Tag 彻底删除！
              if gh release view "$my_tag" -R "$TARGET_REPO" >/dev/null 2>&1; then
                apk_count=$(gh release view "$my_tag" -R "$TARGET_REPO" --json assets --jq '[.assets[] | select(.name | endswith(".apk"))] | length' 2>/dev/null || echo "0")
                if [ "$apk_count" -eq "0" ]; then
                  echo "🗑️ 检测到错误空壳版本 $my_tag，正在自动化删除清理..."
                  gh release delete "$my_tag" --cleanup-tag -y -R "$TARGET_REPO"
                  sleep 2
                fi
              fi
              
              # 重新创建与正确上传（摒弃导致报错的非法规避参数）
              if ! gh release view "$my_tag" -R "$TARGET_REPO" >/dev/null 2>&1; then
                gh release create "$my_tag" -R "$TARGET_REPO" --title "FMApp: $raw_tag" --notes "Auto-synced"
                assets=$(echo "$latest_rel" | jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url')
                for url in $assets; do
                  fname=$(basename "$url")
                  curl -L -o "$fname" "$url"
                  gh release upload "$my_tag" "$fname" --clobber -R "$TARGET_REPO"
                  rm -f "$fname"
                done
              fi
            fi
          done
